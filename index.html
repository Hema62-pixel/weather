<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Real-Time Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌤️ Weather Dashboard 🌈</h1>
        <p class="subtitle">
            Get Real-Time Weather Updates From Anywhere In The World 🌍
        </p>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="🔍 Enter City Name..."
            >
            <button id="searchBtn">🚀 Search</button>
        </div>

        <div id="loading" class="hidden">
            ⏳ Fetching Live Weather Data...
        </div>

        <div id="error" class="error"></div>

        <div id="weatherCard" class="weather-card hidden">

            <div class="weather-header">
                <div class="weather-icon">
                    ☀️
                </div>

                <h2 id="cityName">City Name</h2>
            </div>

            <div class="weather-info">

                <div class="info-box">
                    <h3>🌡️ Temperature</h3>
                    <p>
                        <span id="temperature">--</span> °C
                    </p>
                </div>

                <div class="info-box">
                    <h3>💧 Humidity</h3>
                    <p>
                        <span id="humidity">--</span> %
                    </p>
                </div>

                <div class="info-box">
                    <h3>🌬️ Wind Speed</h3>
                    <p>
                        <span id="wind">--</span> km/h
                    </p>
                </div>

            </div>

            <div class="footer-weather">
                🌎 Live Data Powered by Open-Meteo API
            </div>

        </div>

    </div>

</body>

<script src="script.js"></script>
</html>
